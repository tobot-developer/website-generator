<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Website Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0c0c0c;
            color: #f5f0e8;
            line-height: 1.6;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #c9a96e;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input, textarea, select {
            width: 100%;
            padding: 0.75rem;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            font-size: 1rem;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        .btn {
            width: 100%;
            padding: 1rem;
            background: #c9a96e;
            color: #0c0c0c;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #d4b87a;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .result {
            display: none;
            margin-top: 2rem;
            padding: 2rem;
            background: #141414;
            border: 1px solid #333;
        }
        .result.active {
            display: block;
        }
        .result h2 {
            margin-bottom: 1rem;
            text-align: center;
        }
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .action-btn {
            padding: 1rem;
            background: transparent;
            border: 1px solid #c9a96e;
            color: #c9a96e;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .action-btn:hover {
            background: #c9a96e;
            color: #0c0c0c;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            padding: 2rem;
        }
        .modal.active {
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .modal-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .modal iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: #fff;
        }
        .back-btn {
            display: block;
            margin: 2rem auto 0;
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: 1px solid #333;
            color: #888;
            cursor: pointer;
        }
        .back-btn:hover {
            border-color: #c9a96e;
            color: #c9a96e;
        }
    </style>
</head>
<body>
    <div class="container" id="formContainer">
        <h1>AI Website Generator</h1>
        
        <form id="generatorForm">
            <div class="form-group">
                <label>Firmenname</label>
                <input type="text" id="companyName" placeholder="Mein Unternehmen" required>
            </div>
            
            <div class="form-group">
                <label>Beschreibung</label>
                <textarea id="description" placeholder="Was macht dein Unternehmen?" required></textarea>
            </div>
            
            <div class="form-group">
                <label>E-Mail</label>
                <input type="email" id="email" placeholder="info@beispiel.de">
            </div>
            
            <div class="form-group">
                <label>Design-Stil</label>
                <select id="style">
                    <option value="dark">Dark Luxury</option>
                    <option value="light">Light Minimal</option>
                </select>
            </div>
            
            <button type="submit" class="btn" id="generateBtn">WEBSITE GENERIEREN</button>
        </form>
    </div>

    <div class="result" id="resultPage">
        <h2>Deine Website ist fertig!</h2>
        
        <div class="actions">
            <button class="action-btn" id="previewBtn">👁 Preview</button>
            <button class="action-btn" id="downloadBtn">📥 ZIP Download</button>
        </div>
        
        <button class="back-btn" id="backBtn">← Neue Website</button>
    </div>

    <div class="modal" id="previewModal">
        <div class="modal-header">
            <h3>Preview</h3>
            <button class="modal-close" id="closeModal">✕</button>
        </div>
        <iframe id="previewFrame"></iframe>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <script>
        // Store generated HTML
        let generatedHTML = '';
        let companyName = '';

        // Form submission
        document.getElementById('generatorForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.textContent = 'Generiere...';
            
            // Get values
            companyName = document.getElementById('companyName').value;
            const description = document.getElementById('description').value;
            const email = document.getElementById('email').value || 'info@example.com';
            const style = document.getElementById('style').value;
            
            // Generate website
            generatedHTML = generateWebsite({
                companyName,
                description,
                email,
                style
            });
            
            // Show result
            setTimeout(() => {
                document.getElementById('formContainer').style.display = 'none';
                document.getElementById('resultPage').classList.add('active');
                
                btn.disabled = false;
                btn.textContent = 'WEBSITE GENERIEREN';
            }, 1500);
        });

        // Preview
        document.getElementById('previewBtn').addEventListener('click', () => {
            const modal = document.getElementById('previewModal');
            const frame = document.getElementById('previewFrame');
            frame.srcdoc = generatedHTML;
            modal.classList.add('active');
        });

        // Close modal
        document.getElementById('closeModal').addEventListener('click', () => {
            document.getElementById('previewModal').classList.remove('active');
        });

        // Download ZIP
        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (!generatedHTML) {
                alert('Generiere zuerst eine Website!');
                return;
            }
            
            const zip = new JSZip();
            zip.file('index.html', generatedHTML);
            zip.file('README.md', `# ${companyName} Website\n\n## Setup\n1. Entpacke ZIP\n2. Öffne index.html im Browser\n3. Oder lade auf Webhost hoch\n\n## Hosting\n- GitHub Pages (kostenlos)\n- Vercel (kostenlos)\n- Netlify (kostenlos)`);
            
            zip.generateAsync({type: 'blob'}).then(content => {
                const url = URL.createObjectURL(content);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${companyName.toLowerCase().replace(/\s+/g, '-')}-website.zip`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });
        });

        // Back button
        document.getElementById('backBtn').addEventListener('click', () => {
            document.getElementById('resultPage').classList.remove('active');
            document.getElementById('formContainer').style.display = 'block';
            document.getElementById('generatorForm').reset();
            generatedHTML = '';
        });

        // Website Generator
        function generateWebsite(data) {
            const isDark = data.style === 'dark';
            const bg = isDark ? '#0c0c0c' : '#ffffff';
            const text = isDark ? '#f5f0e8' : '#1a1a1a';
            const accent = '#c9a96e';
            
            return `<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${data.companyName}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: ${bg};
            color: ${text};
            line-height: 1.6;
        }
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .hero p {
            font-size: 1.2rem;
            opacity: 0.8;
            max-width: 600px;
            margin: 0 auto 2rem;
        }
        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: ${accent};
            color: ${isDark ? '#0c0c0c' : '#ffffff'};
            text-decoration: none;
            font-weight: bold;
        }
        .section {
            padding: 5rem 2rem;
            max-width: 800px;
            margin: 0 auto;
        }
        .section h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        .section p {
            opacity: 0.8;
            line-height: 1.8;
        }
        .contact {
            padding: 3rem 2rem;
            text-align: center;
            border-top: 1px solid ${isDark ? '#333' : '#eee'};
        }
        .contact a {
            color: ${accent};
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="hero">
        <div>
            <h1>${data.companyName}</h1>
            <p>${data.description}</p>
            <a href="#contact" class="btn">Kontakt</a>
        </div>
    </div>
    
    <div class="section">
        <h2>Über uns</h2>
        <p>${data.description} Wir bringen langjährige Erfahrung und innovative Lösungen für unsere Kunden.</p>
    </div>
    
    <div class="contact" id="contact">
        <h2>Kontakt</h2>
        <p><a href="mailto:${data.email}">${data.email}</a></p>
    </div>
</body>
</html>`;
        }
    </script>
</body>
</html>
